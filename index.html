<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App | Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <div class="header">
                <div class="icon-header">
                    <span class="main-icon">✅</span>
                    <h1>Task Manager</h1>
                </div>
                <p class="subtitle">Organize your daily tasks</p>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="What needs to be done?" 
                        autocomplete="off"
                        maxlength="100"
                    >
                    <button id="addBtn" class="btn-add">
                        <span class="btn-icon">+</span>
                        <span>Add Task</span>
                    </button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-icon">📋</span>
                    <span id="totalTasks">0</span>
                    <span>Total</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">✅</span>
                    <span id="completedTasks">0</span>
                    <span>Completed</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⏳</span>
                    <span id="pendingTasks">0</span>
                    <span>Pending</span>
                </div>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="tasks-container">
                <ul id="taskList" class="task-list">
                    <!-- Tasks will be dynamically added here -->
                </ul>
            </div>

            <div class="footer-actions">
                <button id="clearCompletedBtn" class="btn-clear">
                    🗑️ Clear Completed
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
